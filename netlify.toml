[build]
  command = "npm run build"
  publish = ".next"

# NEXT_PUBLIC_* 変数はクライアントバンドルに埋め込まれる設計のため
# シークレットスキャンの対象から除外する
[context.production.environment]
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY,NEXT_PUBLIC_BASE_URL,NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY,CONTACT_FROM_EMAIL"

[[plugins]]
  package = "@netlify/plugin-nextjs"
